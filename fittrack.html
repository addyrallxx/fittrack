<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<title>FitTrack</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icon-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="application-name" content="FitTrack">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --black:#000000;--s1:#111111;--s2:#1C1C1E;--s3:#2C2C2E;--s4:#3A3A3C;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --orange:#FF9500;--orange-dim:rgba(255,149,0,0.18);--orange-border:rgba(255,149,0,0.25);
  --coral:#FF6B6B;--coral-dim:rgba(255,107,107,0.18);--coral-border:rgba(255,107,107,0.25);
  --blue:#0A84FF;--blue-light:#4FC3F7;--blue-dim:rgba(79,195,247,0.18);--blue-border:rgba(79,195,247,0.25);
  --green:#30D158;--green-dim:rgba(48,209,88,0.18);--green-border:rgba(48,209,88,0.25);
  --purple:#BF5AF2;--purple-dim:rgba(191,90,242,0.18);--purple-border:rgba(191,90,242,0.25);
  --red:#FF453A;--yellow:#FFD60A;
  --t1:#FFFFFF;--t2:#AEAEB2;--t3:#636366;--t4:#3A3A3C;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --smooth:cubic-bezier(0.25,0.46,0.45,0.94);
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:28px;
  --tab-h:64px;--safe-b:env(safe-area-inset-bottom,16px);--safe-t:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html{height:100%;overflow:hidden;background:#000;}
body{height:100%;overflow:hidden;background:var(--black);color:var(--t1);font-family:-apple-system,'SF Pro Display','SF Pro Text','Roboto',system-ui,sans-serif;font-size:16px;line-height:1.4;-webkit-font-smoothing:antialiased;user-select:none;touch-action:manipulation;}
input,button,select,textarea{font-family:inherit;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;background:none;color:inherit;}
input{outline:none;border:none;background:none;color:inherit;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
/* APP SHELL */
#app{width:100vw;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#screen-container{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 20px);padding-top:var(--safe-t);will-change:transform;background:var(--black);}
.screen::-webkit-scrollbar{display:none;}
/* TAB BAR */
#tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(15,15,15,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:100;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;touch-action:manipulation;}
.tab-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;transition:all 0.25s var(--spring);}
.tab-icon svg{width:22px;height:22px;stroke:var(--t3);transition:stroke 0.2s;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tab-label{font-size:10px;font-weight:500;color:var(--t3);transition:color 0.2s;letter-spacing:0.2px;}
.tab-btn.active .tab-icon svg{stroke:var(--orange);}
.tab-btn.active .tab-label{color:var(--orange);}
.tab-btn.active .tab-icon{transform:scale(1.1) translateY(-1px);}
/* SCREEN HEADERS */
.screen-header{padding:18px 20px 10px;display:flex;align-items:flex-start;justify-content:space-between;}
.header-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.15;}
.header-sub{font-size:13px;color:var(--t2);margin-top:3px;}
.hdr-btn{width:36px;height:36px;background:var(--s2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;border:1px solid var(--border);}
.hdr-btn svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* CARDS */
.card{background:var(--s1);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;}
.section-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin:0 16px 8px;padding:0 4px;}
/* ACTIVITY RINGS */
.rings-wrap{margin:0 16px 12px;background:var(--s1);border-radius:var(--r-lg);border:1px solid var(--border);padding:18px 4px 14px;display:flex;align-items:flex-start;justify-content:space-around;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;}
.ring-svg-wrap{position:relative;width:86px;height:86px;}
.ring-svg-wrap svg{width:86px;height:86px;transform:rotate(-90deg);}
.ring-bg{stroke:var(--s3);fill:none;}
.ring-track{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1.3s var(--spring);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-val{font-size:16px;font-weight:800;line-height:1;letter-spacing:-0.5px;}
.ring-unit{font-size:9px;color:var(--t2);font-weight:500;margin-top:2px;}
.ring-name{font-size:11px;font-weight:600;color:var(--t2);text-align:center;}
/* CHECK-IN CARDS */
.checkin-row{margin:0 16px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.ci-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.3s var(--spring);position:relative;overflow:hidden;}
.ci-card.done{background:rgba(48,209,88,0.06);border-color:var(--green-border);}
.ci-icon{font-size:20px;line-height:1;}
.ci-lbl{font-size:10px;font-weight:600;color:var(--t2);text-align:center;letter-spacing:0.2px;}
.ci-status{font-size:9px;font-weight:600;color:var(--t3);}
.ci-card.done .ci-status{color:var(--green);}
.ci-check{position:absolute;top:6px;right:6px;width:16px;height:16px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:all 0.4s var(--spring);}
.ci-card.done .ci-check{opacity:1;transform:scale(1);}
.ci-check svg{width:9px;height:9px;stroke:#000;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
/* STEPS CARD */
.steps-card{margin:0 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.steps-num{font-size:32px;font-weight:800;color:var(--green);letter-spacing:-1px;line-height:1;}
.prog-track{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 1s var(--spring);}
/* QUICK ACTIONS */
.qa-grid{margin:0 16px 12px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.qa-btn{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform 0.15s var(--spring);}
.qa-btn:active{transform:scale(0.92);}
.qa-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.qa-icon svg{width:17px;height:17px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;}
.qa-lbl{font-size:10px;font-weight:500;color:var(--t2);text-align:center;}
/* WEIGHT HOME CARD */
.wt-card{margin:0 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;justify-content:space-between;}
.wt-big{font-size:30px;font-weight:800;color:var(--purple);letter-spacing:-0.8px;line-height:1;}
.wt-delta-down{font-size:12px;font-weight:600;color:var(--green);}
.wt-delta-up{font-size:12px;font-weight:600;color:var(--coral);}
.wt-delta-same{font-size:12px;font-weight:500;color:var(--t3);}
.wt-log-btn{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple-border);border-radius:20px;padding:9px 16px;font-size:13px;font-weight:700;transition:transform 0.15s var(--spring);}
.wt-log-btn:active{transform:scale(0.95);}
/* TODAY BADGE */
.today-badge{display:inline-flex;align-items:center;gap:5px;background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:14px;padding:4px 12px 4px 8px;font-size:11px;font-weight:600;color:var(--orange);margin-top:7px;letter-spacing:0.2px;}
/* WORKOUT SCREEN */
.day-tabs{padding:0 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--s1);color:var(--t2);font-size:12px;font-weight:600;transition:all 0.2s var(--smooth);line-height:1.4;text-align:center;}
.day-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.ex-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color 0.3s;}
.ex-card.completed{border-color:var(--green-border);background:rgba(48,209,88,0.03);}
.ex-hdr{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;touch-action:manipulation;}
.ex-icon{width:42px;height:42px;background:var(--blue-dim);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.3s;}
.ex-card.completed .ex-icon{background:var(--green-dim);}
.ex-icon svg{width:20px;height:20px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.3s;}
.ex-card.completed .ex-icon svg{stroke:var(--green);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;color:var(--t1);}
.ex-meta{font-size:12px;color:var(--t2);margin-top:2px;}
.ex-muscle{font-size:9px;font-weight:700;background:var(--blue-dim);color:var(--blue-light);padding:3px 8px;border-radius:8px;white-space:nowrap;letter-spacing:0.3px;text-transform:uppercase;flex-shrink:0;}
.ex-done-badge{width:24px;height:24px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:all 0.4s var(--spring);flex-shrink:0;}
.ex-card.completed .ex-done-badge{opacity:1;transform:scale(1);}
.ex-done-badge svg{width:12px;height:12px;stroke:#000;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.ex-chevron{width:18px;height:18px;flex-shrink:0;transition:transform 0.3s var(--smooth);}
.ex-chevron svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.ex-card.open .ex-chevron{transform:rotate(180deg);}
.ex-body{max-height:0;overflow:hidden;transition:max-height 0.45s var(--smooth);}
.ex-card.open .ex-body{max-height:900px;}
.ex-body-inner{padding:0 16px 16px;border-top:1px solid var(--border);padding-top:14px;}
.set-hdr{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:8px;margin-bottom:8px;padding:0 2px;}
.set-hdr-lbl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;text-align:center;}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:8px;margin-bottom:8px;align-items:center;transition:opacity 0.3s;}
.set-row.done{opacity:0.45;}
.set-num{width:26px;height:26px;background:var(--s3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);margin:auto;transition:all 0.3s var(--spring);}
.set-row.done .set-num{background:var(--green);color:#000;}
.set-inp-wrap{background:var(--s2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;overflow:hidden;}
.set-adj{width:28px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:17px;font-weight:300;flex-shrink:0;}
.set-adj:active{background:var(--s3);}
.set-inp{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--t1);background:none;height:36px;min-width:0;}
.set-chk{width:34px;height:34px;background:var(--s3);border-radius:9px;display:flex;align-items:center;justify-content:center;transition:all 0.3s var(--spring);margin:auto;}
.set-chk svg{width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.set-chk.on{background:var(--green);}
.set-chk.on svg{stroke:#000;}
.rest-bar{margin-top:12px;background:var(--s2);border-radius:12px;padding:11px 14px;display:none;align-items:center;justify-content:space-between;}
.rest-bar.show{display:flex;}
.rest-lbl{font-size:12px;color:var(--t2);font-weight:500;}
.rest-cd{font-size:20px;font-weight:800;color:var(--orange);letter-spacing:-0.5px;}
.rest-skip{font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-dim);padding:6px 12px;border-radius:8px;}
.form-cues{margin-top:12px;background:rgba(10,132,255,0.07);border-radius:12px;padding:12px;}
.cue-title{font-size:9px;font-weight:700;color:var(--blue-light);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.cue-item{display:flex;gap:7px;margin-bottom:6px;font-size:12px;color:var(--t2);line-height:1.45;align-items:flex-start;}
.cue-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-light);flex-shrink:0;margin-top:5px;}
.ex-complete-btn{width:100%;margin-top:14px;padding:13px;background:var(--blue);border-radius:var(--r-md);font-size:15px;font-weight:700;color:#fff;text-align:center;transition:all 0.2s var(--spring);}
.ex-complete-btn:active{transform:scale(0.97);}
.ex-complete-btn.done{background:var(--green);color:#000;}
.warmup-banner{margin:0 16px 12px;background:rgba(255,149,0,0.08);border:1px solid rgba(255,149,0,0.2);border-radius:var(--r-md);padding:12px 14px;}
.warmup-title{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px;}
.warmup-txt{font-size:12px;color:var(--t2);line-height:1.55;}
.finish-btn{margin:14px 16px 0;padding:16px;background:linear-gradient(135deg,#FF9500,#FF6B35);border-radius:var(--r-lg);font-size:16px;font-weight:800;color:#fff;text-align:center;transition:transform 0.15s var(--spring);letter-spacing:0.2px;}
.finish-btn:active{transform:scale(0.97);}
.finish-btn.done{background:var(--green);color:#000;}
/* NUTRITION SCREEN */
.macro-card{margin:4px 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.macro-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;}
.macro-cal-big{font-size:36px;font-weight:800;color:var(--orange);letter-spacing:-1px;line-height:1;}
.macro-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.macro-bar-lbl{font-size:12px;font-weight:500;color:var(--t2);width:54px;}
.macro-bar-track{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.macro-bar-fill{height:100%;border-radius:3px;transition:width 0.9s var(--spring);}
.macro-bar-val{font-size:11px;font-weight:600;color:var(--t2);width:60px;text-align:right;}
.food-search-wrap{margin:0 16px 12px;position:relative;}
.food-search-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 44px 13px 44px;font-size:15px;color:var(--t1);transition:border-color 0.2s;}
.food-search-input::placeholder{color:var(--t3);}
.food-search-input:focus{border-color:var(--border2);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:20px;height:20px;pointer-events:none;}
.search-ico svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.search-clr{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:var(--s3);border-radius:50%;display:none;align-items:center;justify-content:center;}
.search-clr.show{display:flex;}
.search-clr svg{width:10px;height:10px;stroke:var(--t2);fill:none;stroke-width:2.5;stroke-linecap:round;}
.search-results{margin:0 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;display:none;}
.search-results.show{display:block;}
.sri{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background 0.1s;}
.sri:last-child{border-bottom:none;}
.sri:active{background:var(--s2);}
.sri-name{font-size:14px;font-weight:500;color:var(--t1);flex:1;}
.sri-macro{font-size:11px;color:var(--t2);margin-top:2px;}
.sri-add{width:28px;height:28px;background:var(--orange-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sri-add svg{width:14px;height:14px;stroke:var(--orange);fill:none;stroke-width:2.5;stroke-linecap:round;}
.search-manual-btn{padding:12px 16px;display:flex;align-items:center;gap:10px;color:var(--blue);font-size:14px;font-weight:600;border-top:1px solid var(--border);width:100%;}
.search-manual-btn svg{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.shake-btn{margin:0 16px 12px;background:var(--coral-dim);border:1px solid var(--coral-border);border-radius:var(--r-md);padding:13px 16px;display:flex;align-items:center;gap:12px;transition:transform 0.15s var(--spring);}
.shake-btn:active{transform:scale(0.98);}
.shake-add{background:var(--coral);color:#fff;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;}
.meal-sec{margin:0 16px 10px;}
.meal-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px;}
.meal-sec-name{font-size:13px;font-weight:600;color:var(--t2);}
.meal-sec-cals{font-size:12px;color:var(--t3);font-weight:500;}
.meal-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.meal-name{font-size:14px;font-weight:500;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meal-macro{font-size:10px;color:var(--t2);margin-top:2px;}
.meal-cal{font-size:14px;font-weight:700;color:var(--orange);}
.meal-del{width:28px;height:28px;background:rgba(255,69,58,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.meal-del svg{width:12px;height:12px;stroke:var(--red);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.water-card{margin:0 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.water-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.water-val{font-size:28px;font-weight:800;color:var(--blue-light);letter-spacing:-0.5px;line-height:1;}
.water-btns{display:flex;gap:7px;margin-top:12px;}
.water-btn{flex:1;background:var(--blue-dim);color:var(--blue-light);border:1px solid var(--blue-border);border-radius:10px;padding:10px 4px;font-size:11px;font-weight:700;text-align:center;transition:transform 0.15s var(--spring);}
.water-btn:active{transform:scale(0.94);}
/* PROGRESS SCREEN */
.wt-chart-card{margin:4px 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.chart-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.chart-current{font-size:30px;font-weight:800;color:var(--purple);letter-spacing:-0.8px;}

.range-tab{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:none;color:var(--t3);font-size:11px;font-weight:600;transition:all 0.2s var(--smooth);}
.range-tab.active{background:var(--purple);border-color:var(--purple);color:#fff;}

.streak-row{margin:0 16px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

.streak-num{font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.5px;}
.streak-lbl{font-size:9px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:5px;}
.cal-card{margin:0 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-day-lbl{text-align:center;font-size:9px;font-weight:600;color:var(--t3);padding:4px 0;text-transform:uppercase;letter-spacing:0.3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:8px;font-size:12px;font-weight:500;color:var(--t2);position:relative;cursor:pointer;}
.cal-cell.today{background:var(--s2);color:var(--t1);font-weight:700;}
.cal-cell.empty{opacity:0;pointer-events:none;}
.cal-cell-dot{width:4px;height:4px;border-radius:50%;}
.bstats-card{margin:0 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.stat-box{background:var(--s2);border-radius:var(--r-sm);padding:12px 8px;text-align:center;}
.stat-box-lbl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.stat-box-val{font-size:20px;font-weight:800;letter-spacing:-0.3px;line-height:1;}
.stat-box-unit{font-size:10px;color:var(--t2);font-weight:500;margin-top:1px;}
.stat-box-sub{font-size:9px;color:var(--t3);margin-top:3px;}

.settings-sec{margin:0 16px 16px;}

.settings-row:last-child{border-bottom:none;}

/* ── NAVIGATION ─────────────────────────────── */
function go(idx){
  if(idx===S.screen)return;
  const dir=idx>S.screen?1:-1;
  const old=document.getElementById('s'+S.screen);
  const nw=document.getElementById('s'+idx);
  renderScreen(idx);
  nw.style.cssText='transform:translateX('+dir*100+'%);transition:none;';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const t='transform 0.36s cubic-bezier(0.25,0.46,0.45,0.94)';
    old.style.cssText='transform:translateX('+(-dir*100)+'%);transition:'+t+';';
    nw.style.cssText='transform:translateX(0);transition:'+t+';';
  }));
  S.screen=idx;
  updateTabs();
}
function updateTabs(){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===S.screen));}
/* ── RING BUILDER ───────────────────────────── */
function ring(id,color,val,max,display,unit){
  const r=35,c=2*Math.PI*r;
  return `<div class="ring-item">
    <div class="ring-svg-wrap">
      <svg viewBox="0 0 86 86">
        <circle class="ring-bg" cx="43" cy="43" r="${r}" stroke-width="7"/>
        <circle class="ring-track" id="rt-${id}" cx="43" cy="43" r="${r}" stroke="${color}" stroke-width="7"
          stroke-dasharray="${c}" stroke-dashoffset="${c}"/>
      </svg>
      <div class="ring-center">
        <div class="ring-val" style="color:${color}" id="rv-${id}">${display}</div>
        <div class="ring-unit">${unit}</div>
      </div>
    </div>
    <div class="ring-name" style="color:${color};opacity:.8;">${id.toUpperCase()}</div>
  </div>`;
}
function animRing(id,val,max){
  const r=35,c=2*Math.PI*r,el=document.getElementById('rt-'+id);
  if(!el)return;
  const pct=Math.min(val/max,1);
  setTimeout(()=>{el.style.transition='stroke-dashoffset 1.3s cubic-bezier(0.34,1.56,0.64,1)';el.style.strokeDashoffset=c*(1-pct);},60);
}
function countUp(id,target,dec=0){
  const el=document.getElementById('rv-'+id);if(!el)return;
  const dur=900,start=performance.now();
  const step=now=>{const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3),v=target*e;
    el.textContent=dec>0?v.toFixed(dec):Math.round(v).toLocaleString();
    if(p<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}

/* ── RUN PROTOCOL ───────────────────────────── */
const RUN_WEEKS=[
{week:1,dates:'Apr 15–21',protocol:'Run 3 min, walk 2 min — repeat',duration:'45 min',cal:'~350–400 kcal'},
{week:2,dates:'Apr 22–28',protocol:'Run 5 min, walk 1 min — repeat',duration:'50 min',cal:'~400–450 kcal'},
{week:3,dates:'Apr 29–May 5',protocol:'Continuous steady jog',duration:'55 min',cal:'~450–500 kcal'},
{week:4,dates:'May 6–12',protocol:'Continuous jog — push pace slightly',duration:'60 min',cal:'~500–560 kcal'},
{week:5,dates:'May 13–21',protocol:'Full hour — strong pace',duration:'60 min',cal:'~550–600 kcal'},
];

function getRunWeek(){
  const start=new Date('2026-04-15');
  const now=new Date();
  const diff=Math.floor((now-start)/(1000*60*60*24*7));
  return Math.min(Math.max(diff,0),4);
}



/* ── PHASE HELPERS ──────────────────────────── */
function getPhase(){
  const now=new Date();
  const lockIn=new Date('2026-04-15');
  return now>=lockIn?2:1;
}
function getDaysToFlight(){
  const flight=new Date('2026-05-21');
  const now=new Date();
  const diff=Math.ceil((flight-now)/(1000*60*60*24));
  return Math.max(0,diff);
}

/* ── PHASE BANNER (home screen) ─────────────── */
function renderPhaseBanner(){
  const phase=getPhase();
  const days=getDaysToFlight();
  const isP1=phase===1;
  const title=isP1?'Phase 1 — Exam Mode':'Phase 2 — Full Lock-In 🔥';
  const sub=isP1?'Home workouts + gym when possible. Nail nutrition and water every day.':'Morning run + evening gym every day. This is where the transformation happens.';
  const pills=isP1?['4L Water','140g Protein','Creatine 5g','Low Sodium']:['Morning Run','Evening Gym','150g+ Protein','4.5L Water'];
  return `<div class="phase-banner ${isP1?'phase1':'phase2'}">
    <div class="phase-label">${isP1?'📚 Exam Mode':'⚡ Lock-In Mode'}</div>
    <div class="phase-title">${title}</div>
    <div class="phase-sub">${sub}</div>
    <div class="phase-countdown">
      <div class="phase-days">${days}</div>
      <div class="phase-days-lbl">days to<br>flight ✈️</div>
    </div>
    <div class="phase-pills">${pills.map(p=>`<span class="phase-pill">${p}</span>`).join('')}</div>
  </div>`;
}

/* ── RUN TRACKER (home screen) ──────────────── */
function renderRunTracker(){
  const phase=getPhase();
  if(phase<2){
    // Phase 1 — show preview
    return `<div class="run-card">
      <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">Morning Run — Starts Apr 15</div>
      <div class="run-protocol">Your <strong>1-hour daily run</strong> begins April 15 with a progressive protocol. Week 1 starts with run/walk intervals to protect your joints. Full continuous jog by Week 3.</div>
      <div style="font-size:12px;color:var(--green);font-weight:600">🏃 ${getDaysToFlight()-36} days until lock-in begins</div>
    </div>`;
  }
  const wk=getRunWeek();
  const proto=RUN_WEEKS[wk];
  const todayRun=S.log.todayRun||{};
  return `<div class="run-card">
    <div class="run-week-badge">🏃 Week ${proto.week} · ${proto.dates}</div>
    <div class="run-protocol"><strong>Today's protocol:</strong> ${proto.protocol}<br>${proto.duration} · ${proto.cal}</div>
    ${todayRun.done?
      `<div style="background:var(--green-dim);border:1px solid var(--green-border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">✅</span>
        <div><div style="font-size:13px;font-weight:700;color:var(--green)">Run complete!</div>
        <div style="font-size:11px;color:var(--t2)">${todayRun.duration||'--'} min · ${todayRun.distance||'--'} km</div></div>
      </div>`:
      `<div class="run-log-row">
        <input class="run-inp" id="run-dur" type="number" placeholder="Duration (min)" inputmode="numeric">
        <input class="run-inp" id="run-dist" type="number" placeholder="Distance (km)" inputmode="decimal" step="0.1">
        <button class="run-save-btn" onclick="saveRun()">Log ✓</button>
      </div>`
    }
  </div>`;
}

function saveRun(){
  const dur=document.getElementById('run-dur')?.value;
  const dist=document.getElementById('run-dist')?.value;
  if(!dur)return;
  if(!S.log.todayRun)S.log.todayRun={};
  S.log.todayRun={done:true,duration:dur,distance:dist};
  DB.saveLog(S.today,S.log);
  renderScreen(0);
  toast('🏃','Run logged!',`${dur} min · ${dist||'--'} km — great work!`);
}

function toggleEx(id){const c=document.getElementById('ec-'+id);if(c)c.classList.toggle('open');}
function switchDay(i){S.workoutDay=i;renderScreen(1);}
function adj(exId,i,field,delta){
  const id=field==='w'?`sw-${exId}-${i}`:`sr-inp-${exId}-${i}`;
  const el=document.getElementById(id);if(!el)return;
  let v=parseFloat(el.value)||0;
  v=Math.max(0,v+delta);
  el.value=field==='w'?v.toFixed(1):Math.round(v);
  updSet(exId,i,field,el.value);
}
function updSet(exId,i,field,val){
  if(!S.log.workout.exercises[exId])S.log.workout.exercises[exId]={sets:[],completed:false};
  if(!S.log.workout.exercises[exId].sets)S.log.workout.exercises[exId].sets=[];
  if(!S.log.workout.exercises[exId].sets[i])S.log.workout.exercises[exId].sets[i]={};
  S.log.workout.exercises[exId].sets[i][field==='w'?'weight':'reps']=field==='w'?parseFloat(val):parseInt(val);
  DB.saveLog(S.today,S.log);
}
function toggleSet(exId,i){
  if(!S.log.workout.exercises[exId])S.log.workout.exercises[exId]={sets:[],completed:false};
  const exLog=S.log.workout.exercises[exId];
  if(!exLog.sets)exLog.sets=[];
  if(!exLog.sets[i])exLog.sets[i]={};
  const w=document.getElementById(`sw-${exId}-${i}`)?.value;
  const r=document.getElementById(`sr-inp-${exId}-${i}`)?.value;
  if(w)exLog.sets[i].weight=parseFloat(w);
  if(r)exLog.sets[i].reps=parseInt(r);
  exLog.sets[i].done=!exLog.sets[i].done;
  DB.saveLog(S.today,S.log);
  const row=document.getElementById(`sr-${exId}-${i}`);
  const chk=document.getElementById(`sc-${exId}-${i}`);
  const num=row?.querySelector('.set-num');
  if(row)row.classList.toggle('done',exLog.sets[i].done);
  if(chk)chk.classList.toggle('on',exLog.sets[i].done);
  if(num&&exLog.sets[i].done){num.style.transform='scale(0)';setTimeout(()=>{num.style.transition='transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';num.style.transform='scale(1)';},60);}
  const ex=S.workout.days[S.workoutDay].exercises.find(e=>e.id===exId);
  if(ex){
    const sdone=(exLog.sets||[]).filter(s=>s?.done).length;
    const btn=document.getElementById('ecb-'+exId);
    if(btn&&!exLog.completed)btn.textContent=`Mark complete (${sdone}/${ex.sets} sets done)`;
    if(exLog.sets[i].done)startRest(exId,ex.restSec||90);
  }
}
function startRest(exId,secs){
  if(S.restTimers[exId])clearInterval(S.restTimers[exId].t);
  const bar=document.getElementById('rb-'+exId);
  const cd=document.getElementById('rc-'+exId);
  if(!bar||!cd)return;
  bar.classList.add('show');
  let rem=secs;
  cd.textContent=fmtTime(rem);
  const t=setInterval(()=>{
    rem--;
    const el=document.getElementById('rc-'+exId);
    if(el)el.textContent=fmtTime(rem);
    if(rem<=0){clearInterval(t);delete S.restTimers[exId];const b=document.getElementById('rb-'+exId);if(b)b.classList.remove('show');toast('⏱️','Rest complete!','Time for next set');}
  },1000);
  S.restTimers[exId]={t};
}
function stopRest(exId){
  if(S.restTimers[exId]){clearInterval(S.restTimers[exId].t);delete S.restTimers[exId];}
  const bar=document.getElementById('rb-'+exId);
  if(bar)bar.classList.remove('show');
}
function completeEx(exId){
  if(!S.log.workout.exercises[exId])S.log.workout.exercises[exId]={sets:[],completed:false};
  S.log.workout.exercises[exId].completed=true;
  DB.saveLog(S.today,S.log);
  stopRest(exId);
  const card=document.getElementById('ec-'+exId);
  const btn=document.getElementById('ecb-'+exId);
  if(card){card.classList.add('completed');card.classList.remove('open');}
  if(btn){btn.textContent='✓ Complete';btn.classList.add('done');}
  const d=S.workout.days[S.workoutDay];
  const done=d.exercises.filter(e=>S.log.workout.exercises[e.id]?.completed).length;
  const prog=document.getElementById('wk-prog');
  if(prog)prog.style.width=(done/d.exercises.length*100)+'%';
  const label=document.querySelector('#s1 .prog-track')?.previousElementSibling?.querySelector('.flex-bc div');
  if(label)label.textContent=`${done}/${d.exercises.length} exercises done`;
  if(done>0&&!document.querySelector('.finish-btn'))renderScreen(1);
}

async function fetchFoodAPI(q){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?lc=en&search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=5&fields=product_name,nutriments`);
    if(!r.ok)return;

function calcStreak(all,field){
  let s=0;const t=new Date();
  for(let i=0;i<90;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(all[k]?.checkins?.[field])s++;else break;
  }
  return s;
}
function buildCal(){

  const dls=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  let cells='';
  for(let i=0;i<first;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const log=all[ds],isT=ds===S.today;

/* ── SWIPE NAVIGATION ───────────────────────── */
function initSwipe(){
  const c=document.getElementById('screen-container');
  let sx=0,sy=0,dragging=false;
  c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=false;},{passive:true});
  c.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!dragging&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)dragging=true;
  },{passive:true});
  c.addEventListener('touchend',e=>{
    if(!dragging)return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>55){
      if(dx<0&&S.screen<5)go(S.screen+1);
      else if(dx>0&&S.screen>0)go(S.screen-1);
    }
    dragging=false;
  },{passive:true});
}

    openSheet(`<div style="padding:0 20px 24px;text-align:center">
      <div style="font-size:52px;margin:16px 0 12px">🔥</div>
      <div style="font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px">Home workout done!</div>
      <div style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:20px">All 3 blocks complete. Consistency is building your new body.</div>
      <button class="sheet-btn sheet-btn-primary" onclick="closeSheet()">Close</button>
    </div>`,'');
    return;
  }
  const ex=block.exercises[hwActive.exIdx];
  if(!ex){hwActive.blockIdx++;hwActive.exIdx=0;hwActive.setIdx=0;showHWTimerSheet();return;}
  const setsDone=hwActive.setIdx;
  const setsTotal=ex.sets;
  openSheet(`<div style="padding:0 20px 20px">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">Exercise ${curExGlobal+1} of ${totalEx}</div>
      <div style="font-size:26px;margin-bottom:6px">${ex.emoji}</div>
      <div style="font-size:22px;font-weight:800;color:var(--t1);margin-bottom:4px">${ex.name}</div>
      <div style="font-size:14px;color:var(--orange);font-weight:700;margin-bottom:8px">Set ${setsDone+1} of ${setsTotal} · ${ex.reps}</div>
      <div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:20px">${ex.tip}</div>
      <div id="hw-timer-disp" style="font-size:52px;font-weight:800;color:var(--green);letter-spacing:-2px;line-height:1;margin-bottom:16px;display:none">0:${String(ex.restSec).padStart(2,'0')}</div>
    </div>
    <button id="hw-next-btn" class="sheet-btn sheet-btn-primary" onclick="hwDoneSet(${ex.restSec})">Done this set ✓</button>
    <button onclick="hwSkipEx()" style="width:100%;padding:12px;font-size:13px;color:var(--t3);margin-top:6px">Skip exercise</button>
  </div>`,`${block.name}`);
}

function hwDoneSet(restSec){
  const block=HOME_WORKOUT.blocks[hwActive.blockIdx];
  const ex=block?.exercises[hwActive.exIdx];
  if(!ex)return;
  hwActive.setIdx++;
  if(hwActive.setIdx>=ex.sets){
    // All sets done — rest then next exercise
    hwActive.setIdx=0;hwActive.exIdx++;
    startHWRest(restSec,()=>{closeSheet();setTimeout(showHWTimerSheet,100);});
  } else {
    // More sets — rest then same exercise
    startHWRest(restSec,()=>{showHWTimerSheet();});
  }
}

function hwSkipEx(){
  hwActive.setIdx=0;hwActive.exIdx++;
  const block=HOME_WORKOUT.blocks[hwActive.blockIdx];
  if(!block||hwActive.exIdx>=block.exercises.length){hwActive.blockIdx++;hwActive.exIdx=0;}
  closeSheet();setTimeout(showHWTimerSheet,100);
}

function startHWRest(secs,cb){
  let rem=secs;
  const disp=document.getElementById('hw-timer-disp');
  const btn=document.getElementById('hw-next-btn');
  if(disp)disp.style.display='block';
  if(btn){btn.textContent='Resting...';btn.style.background='var(--s3)';btn.style.color='var(--t2)';}
  const t=setInterval(()=>{
    rem--;
    const el=document.getElementById('hw-timer-disp');
    if(el)el.textContent=fmtTime(rem);
    if(rem<=0){clearInterval(t);if(cb)cb();}
  },1000);
}

/* phase banner baked into renderHome directly */


function toggleSplit(){
  openSheet(`<div class="sheet-body">
    <div style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:16px">Choose your active workout split.</div>
    <button onclick="setSplit(false)" class="sheet-btn ${!S.cfg.usePhase2Split?'sheet-btn-primary':'sheet-btn-secondary'}" style="text-align:left;padding:16px">
      <div style="font-size:15px;font-weight:700">Phase 1 — 4-Day Split</div>
      <div style="font-size:12px;opacity:.7;margin-top:3px">Upper/Lower · Push/Pull · For exam period</div>
    </button>
    <button onclick="setSplit(true)" class="sheet-btn ${S.cfg.usePhase2Split?'sheet-btn-primary':'sheet-btn-secondary'}" style="text-align:left;padding:16px">
      <div style="font-size:15px;font-weight:700">Phase 2 — 6-Day Split 🔥</div>
      <div style="font-size:12px;opacity:.7;margin-top:3px">Push/Pull/Lower × 2 · Full lock-in mode</div>
    </button>
  </div>`,'Workout Split');
}
function setSplit(useP2){
  S.cfg.usePhase2Split=useP2;
  DB.saveSettings(S.cfg);
  S.workoutDay=0;
  closeSheet();
  renderScreen(4);
  renderScreen(1);
  toast('✅',useP2?'Phase 2 split activated 🔥':'Phase 1 split activated','');
}


/* ── SERVICE WORKER ─────────────────────────── */
function registerSW(){
  if(!('serviceWorker' in navigator))return;
  const swCode=`
const CACHE='fittrack-v${Date.now()}';
const URLS=['./fittrack.html'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.mode==='navigate'){e.respondWith(fetch(e.request).then(r=>{const rc=r.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));return r;}).catch(()=>caches.match(e.request)));}});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'./'}).catch(()=>{});
}

document.addEventListener('DOMContentLoaded',init);
